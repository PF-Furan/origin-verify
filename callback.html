<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Origin-PT — Verify</title>
  <style>
    :root {
      --bg:     #0a0a0a; --surface: #111111; --border: #1f1f1f;
      --text:   #ededed; --muted:   #666666; --faint:  #2e2e2e;
      --accent: #5865f2; --ok: #16a34a; --err: #dc2626;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; flex-direction: column;
      font-size: 14px; -webkit-font-smoothing: antialiased;
    }
    header {
      height: 56px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px;
      background: rgba(10,10,10,.85); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 10;
    }
    .logo { display: flex; align-items: center; gap: 9px; text-decoration: none; color: var(--text); font-weight: 600; font-size: 15px; }
    .logo-mark { width: 24px; height: 24px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    .card {
      width: 100%; max-width: 380px;
      border: 1px solid var(--border); border-radius: 12px;
      background: var(--surface); padding: 40px 32px; text-align: center;
      animation: up .2s ease both;
    }
    .state-icon {
      width: 60px; height: 60px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 22px; font-size: 28px;
    }
    .state-icon.ok  { background: rgba(22,163,74,.1);  border: 1px solid rgba(22,163,74,.25);  }
    .state-icon.err { background: rgba(220,38,38,.1);  border: 1px solid rgba(220,38,38,.25);  }
    h1 { font-size: 20px; font-weight: 600; letter-spacing: -.3px; margin-bottom: 8px; }
    .sub { color: var(--muted); font-size: 13px; line-height: 1.65; }
    .pill {
      display: inline-block; margin-top: 18px;
      padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .pill.ok  { background: rgba(22,163,74,.12);  color: #4ade80; border: 1px solid rgba(22,163,74,.3);  }
    .pill.err { background: rgba(220,38,38,.12);  color: #f87171; border: 1px solid rgba(220,38,38,.3);  }
    footer { text-align: center; padding: 28px; color: var(--faint); font-size: 11px; }
    @keyframes up  { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    @media (max-width: 480px) {
      .card { padding: 28px 20px; border-radius: 0; border-left: none; border-right: none; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-mark">
      <svg width="14" height="11" viewBox="0 0 14 11" fill="none">
        <path d="M1 9.5l3-7 2.5 5 2-3 2.5 5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    Origin-PT
  </a>
</header>

<main>
  <div class="card">
    <div class="state-icon" id="icon"></div>
    <h1 id="t-title"></h1>
    <p class="sub" id="t-desc"></p>
    <div id="pill" class="pill"></div>
  </div>
</main>

<footer id="t-foot">Origin-PT Verify System</footer>

<script>
  const params = new URLSearchParams(location.search);
  const LANG   = params.get("lang") === "en" ? "en" : "ja";
  const STATUS = params.get("status");   // "ok" or "error"

  const T = {
    ja: {
      ok: "認証が完了しました", okDesc: "Discord DM で認証手順をご確認ください。",
      okPill: "認可成功",
      err: "認証に失敗しました", errDesc: "時間をおいて再度お試しください。",
      errPill: "エラー",
      foot: "Origin-PT Verify System",
    },
    en: {
      ok: "Authorization Complete", okDesc: "Check your Discord DM for next steps.",
      okPill: "Authorized",
      err: "Authorization Failed", errDesc: "Please try again later.",
      errPill: "Error",
      foot: "Origin-PT Verify System",
    },
  }[LANG];

  document.documentElement.lang = LANG;
  document.getElementById("t-foot").textContent = T.foot;

  const icon    = document.getElementById("icon");
  const titleEl = document.getElementById("t-title");
  const descEl  = document.getElementById("t-desc");
  const pillEl  = document.getElementById("pill");

  if (STATUS === "ok") {
    icon.className    = "state-icon ok";
    icon.textContent  = "✅";
    titleEl.textContent = T.ok;
    descEl.textContent  = T.okDesc;
    pillEl.className    = "pill ok";
    pillEl.textContent  = T.okPill;
    setTimeout(() => {
      if (window.opener) { window.opener.postMessage({ status: "success" }, "*"); window.close(); }
    }, 3000);
  } else {
    icon.className    = "state-icon err";
    icon.textContent  = "❌";
    titleEl.textContent = T.err;
    descEl.textContent  = T.errDesc;
    pillEl.className    = "pill err";
    pillEl.textContent  = T.errPill;
  }
</script>
</body>
</html>
