<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Origin-PT — Link Account</title>
  <style>
    :root {
      --bg:     #0a0a0a; --surface: #111111; --border: #1f1f1f;
      --text:   #ededed; --muted:   #666666; --faint:  #2e2e2e;
      --accent: #5865f2;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; flex-direction: column;
      font-size: 14px; -webkit-font-smoothing: antialiased;
    }
    header {
      height: 56px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px;
      background: rgba(10,10,10,.85); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 10;
    }
    .logo { display: flex; align-items: center; gap: 9px; text-decoration: none; color: var(--text); font-weight: 600; font-size: 15px; }
    .logo-mark { width: 24px; height: 24px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    .card {
      width: 100%; max-width: 400px;
      border: 1px solid var(--border); border-radius: 12px;
      background: var(--surface); padding: 36px 32px; text-align: center;
      animation: up .2s ease both;
    }
    .icon {
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(88,101,242,.1); border: 1px solid rgba(88,101,242,.2);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 22px;
    }
    h1 { font-size: 20px; font-weight: 600; letter-spacing: -.3px; margin-bottom: 8px; }
    .sub { color: var(--muted); font-size: 13px; line-height: 1.65; margin-bottom: 28px; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; background: var(--accent); color: #fff;
      border: none; border-radius: 7px; padding: 12px 20px;
      font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none;
      transition: opacity .15s, transform .1s;
    }
    .btn:hover { opacity: .85; color: #fff; text-decoration: none; }
    .btn:active { transform: scale(.98); }
    .btn.disabled { opacity: .4; pointer-events: none; }
    .spin {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.25); border-top-color: #fff;
      border-radius: 50%; animation: rot .65s linear infinite; display: none;
    }
    footer { text-align: center; padding: 28px; color: var(--faint); font-size: 11px; }
    @keyframes up  { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    @keyframes rot { to { transform:rotate(360deg); } }
    @media (max-width: 480px) {
      .card { padding: 28px 20px; border-radius: 0; border-left: none; border-right: none; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-mark">
      <svg width="14" height="11" viewBox="0 0 14 11" fill="none">
        <path d="M1 9.5l3-7 2.5 5 2-3 2.5 5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    Origin-PT
  </a>
</header>

<main>
  <div class="card">
    <div class="icon">
      <svg width="24" height="18" viewBox="0 0 24 18" fill="none">
        <path d="M20.317 1.492A19.823 19.823 0 0 0 15.51 0c-.215.395-.466.928-.637 1.35a18.39 18.39 0 0 0-5.745 0A13.67 13.67 0 0 0 8.49 0 19.836 19.836 0 0 0 3.677 1.496C.529 6.444-.324 11.281.102 16.05c2.099 1.58 4.132 2.541 6.136 3.17.495-.765.934-1.574 1.313-2.417a12.92 12.92 0 0 1-2.068-1.018c.174-.127.344-.26.509-.394 3.939 1.863 8.21 1.863 12.103 0 .167.134.337.267.51.394a12.923 12.923 0 0 1-2.072 1.02c.38.843.818 1.653 1.313 2.418 2.006-.63 4.042-1.591 6.14-3.173.508-5.385-.866-10.18-3.679-14.558ZM8.02 13.184c-1.243 0-2.261-1.17-2.261-2.602 0-1.432.995-2.604 2.261-2.604 1.265 0 2.284 1.172 2.26 2.604 0 1.432-.995 2.602-2.26 2.602Zm7.98 0c-1.244 0-2.261-1.17-2.261-2.602 0-1.432.994-2.604 2.26-2.604 1.266 0 2.284 1.172 2.261 2.604 0 1.432-.985 2.602-2.26 2.602Z" fill="#5865f2"/>
      </svg>
    </div>

    <h1 id="t-title">Discord アカウントを連携</h1>
    <p class="sub" id="t-sub">認証のためにDiscordアカウントとメールアドレスの確認を行います。</p>

    <a id="auth-link" class="btn disabled" href="#">
      <svg width="18" height="14" viewBox="0 0 24 18" fill="none">
        <path d="M20.317 1.492A19.823 19.823 0 0 0 15.51 0c-.215.395-.466.928-.637 1.35a18.39 18.39 0 0 0-5.745 0A13.67 13.67 0 0 0 8.49 0 19.836 19.836 0 0 0 3.677 1.496C.529 6.444-.324 11.281.102 16.05c2.099 1.58 4.132 2.541 6.136 3.17.495-.765.934-1.574 1.313-2.417a12.92 12.92 0 0 1-2.068-1.018c.174-.127.344-.26.509-.394 3.939 1.863 8.21 1.863 12.103 0 .167.134.337.267.51.394a12.923 12.923 0 0 1-2.072 1.02c.38.843.818 1.653 1.313 2.418 2.006-.63 4.042-1.591 6.14-3.173.508-5.385-.866-10.18-3.679-14.558ZM8.02 13.184c-1.243 0-2.261-1.17-2.261-2.602 0-1.432.995-2.604 2.261-2.604 1.265 0 2.284 1.172 2.26 2.604 0 1.432-.995 2.602-2.26 2.602Zm7.98 0c-1.244 0-2.261-1.17-2.261-2.602 0-1.432.994-2.604 2.26-2.604 1.266 0 2.284 1.172 2.261 2.604 0 1.432-.985 2.602-2.26 2.602Z" fill="#fff"/>
      </svg>
      <div class="spin" id="spinner"></div>
      <span id="t-btn">読み込み中...</span>
    </a>
  </div>
</main>

<footer id="t-foot">Origin-PT Verify System</footer>

<script>
  const API_BASE = "https://auth.pf-furan.com";

  const LANG = (new URLSearchParams(location.search).get("lang") || "ja") === "en" ? "en" : "ja";
  const T = {
    ja: { title: "Discord アカウントを連携", sub: "認証のためにDiscordアカウントとメールアドレスの確認を行います。", btn: "Discord で認証", foot: "Origin-PT Verify System" },
    en: { title: "Link your Discord account", sub: "We need to verify your Discord account and email address.", btn: "Authorize with Discord", foot: "Origin-PT Verify System" },
  }[LANG];

  document.documentElement.lang = LANG;
  const $ = id => document.getElementById(id);
  $("t-title").textContent = T.title;
  $("t-sub").textContent   = T.sub;
  $("t-foot").textContent  = T.foot;

  async function loadState() {
    try {
      const res  = await fetch(`${API_BASE}/api/oauth/state`);
      if (!res.ok) return;
      const data = await res.json();

      const oauthUrl =
        `https://discord.com/api/oauth2/authorize` +
        `?client_id=${data.client_id}` +
        `&redirect_uri=${encodeURIComponent(data.redirect_uri)}` +
        `&response_type=code&scope=identify%20email` +
        `&state=${encodeURIComponent(data.state)}`;

      const link = $("auth-link");
      link.href = oauthUrl;
      link.classList.remove("disabled");
      $("t-btn").textContent = T.btn;

      link.addEventListener("click", () => {
        $("spinner").style.display = "block";
        $("t-btn").style.opacity   = "0.5";
        link.classList.add("disabled");
      });
    } catch { /* エラー時はボタン無効のまま */ }
  }

  loadState();
</script>
</body>
</html>
